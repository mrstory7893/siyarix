name: 🚀 Feature Request
description: Suggest an idea or feature to improve Siyarix
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - mufthakherul
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to submit a feature request!
        Our AI-native architecture is highly extensible, so we welcome bold ideas.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct and Ethical Hacking Policy.
          required: true
