name: Package Size Tracker

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          uv pip install --system build
          python -m build

      - name: Check Size
        id: check_size
        run: |
          WHEEL_FILE=$(ls dist/*.whl)
          SIZE_BYTES=$(stat -c%s "$WHEEL_FILE")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          echo "size=$SIZE_MB" >> "$GITHUB_OUTPUT"

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const size = '${{ steps.check_size.outputs.size }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Package Size Report**\nThe compiled wheel for this PR is **${size} MB**.`
            })
