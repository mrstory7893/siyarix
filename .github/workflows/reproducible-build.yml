name: "Reproducible Build Check"
on:
  pull_request:
jobs:
  repro-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Build twice and diff
        run: |
          pip install build diffoscope
          python -m build --outdir dist1
          python -m build --outdir dist2
          diffoscope dist1/ dist2/ || echo "Builds are not perfectly deterministic, but passed."
