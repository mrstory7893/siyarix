name: Issue & PR Manager
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign newly opened issues and PRs
        uses: actions/github-script@v7
        with:
          script: |
            const assignee = 'mufthakherul';
            if (context.eventName === 'issues') {
              github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [assignee]
              });
            } else if (context.eventName === 'pull_request_target') {
              github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [assignee]
              });
            }
