name: License Compliance Check
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  check-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e .
      - name: Check Licenses
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GPL;AGPL;GNU" --allow-only="MIT;Apache Software License;BSD License;ISC License (ISCL);PSF License" || echo "License check failed but continuing for now"
