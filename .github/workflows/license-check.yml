name: "License Compliance"
on:
  pull_request:
jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install pip-licenses
          pip install -e .
      - name: Check Licenses
        run: |
          pip-licenses --format=markdown --with-system --output-file=licenses.md
          cat licenses.md
          # Example to fail if GPL is found (uncomment in prod if strict)
          # if grep -q -i "gpl" licenses.md; then echo "GPL License found"; exit 1; fi
