name: "Dead Code Detection"
on:
  pull_request:
jobs:
  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Vulture
        run: pip install vulture
      - name: Find Dead Code
        run: vulture src/ --min-confidence 100 || true
