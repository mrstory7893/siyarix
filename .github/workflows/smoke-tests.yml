name: "Smoke Tests"
on:
  pull_request:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Build and install wheel
        run: |
          pip install build
          python -m build
          pip install dist/*.whl
      - name: Run CLI check
        run: |
          siyarix --help || true
