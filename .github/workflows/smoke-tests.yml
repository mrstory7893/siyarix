name: Smoke Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install wheel
        run: |
          uv pip install --system build
          python -m build
          uv pip install --system dist/*.whl

      - name: Run CLI smoke check
        run: |
          siyarix --version
          siyarix --help
          python -c "import siyarix; print('Package OK:', siyarix.__version__)"
