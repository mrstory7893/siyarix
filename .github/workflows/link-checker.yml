name: "Dead Link Checker"
on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12 PM
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --accept=200,204,429 --exclude-mail --no-progress './**/*.md' './**/*.html'
          fail: true
