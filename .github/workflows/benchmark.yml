name: "Performance Benchmark"
on:
  pull_request:
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: pip install -e .[dev] pytest-benchmark
      - name: Run Benchmarks
        run: pytest tests/ --benchmark-only || true
