name: Performance Benchmark
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: pip install -e .[dev]
      - name: Run benchmark tests
        run: pytest tests/ --benchmark-only || echo "No benchmarks configured yet."
