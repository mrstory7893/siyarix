name: Outdated Dependencies Check
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
jobs:
  check-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: List outdated packages
        run: |
          pip install -e .
          pip list --outdated
