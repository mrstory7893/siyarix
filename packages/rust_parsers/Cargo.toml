[package]
name = "siyarix_rust_parsers"
version = "0.1.0"
edition = "2021"
description = "Siyarix Rust-based security tool parsers (nmap, nuclei, nikto, gobuster)"

[lib]
name = "siyarix_rust_parsers"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.29.0", features = ["extension-module"] }
roxmltree = "0.20"
serde_json = "1.0"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
